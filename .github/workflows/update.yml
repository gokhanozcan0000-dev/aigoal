name: Weekly Match Update
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests anthropic
      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python update.py
      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add index.html
          git diff --staged --quiet || git commit -m "Weekly predictions update"
          git push
      - name: Trigger Cloudflare deploy
        run: curl -X POST "https://api.cloudflare.com/client/v4/workers/builds/deploy_hooks/adc3bbb6-4df9-49e3-910d-3feb2fd0e7cb"
